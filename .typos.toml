[default.extend-words]
k8s = "k8s"
KServe = "KServe"
vLLM = "vLLM"
# base64-encoded values contain uppercase letter runs (e.g. "UE9EUw...") that
# are not English words; suppress the false positive.
UE = "UE"

[files]
extend-exclude = [
    "*.png",
    "*.jpg",
    "deploy/**",
    "go.mod",
    "go.sum",
    "bin/**"
]
