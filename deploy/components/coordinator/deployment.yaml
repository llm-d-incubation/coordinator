apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-coordinator
  labels:
    app: llm-d-coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-d-coordinator
  template:
    metadata:
      labels:
        app: llm-d-coordinator
    spec:
      serviceAccountName: llm-d-coordinator
      terminationGracePeriodSeconds: 30
      initContainers:
      - name: vllm-render
        image: ${VLLM_RENDER_IMAGE}
        imagePullPolicy: IfNotPresent
        restartPolicy: Always
        command: ["vllm"]
        args: ["launch", "render", "${MODEL_NAME}", "--port=8000"]
        env:
        - name: HF_TOKEN
          value: "${HF_TOKEN}"
        ports:
        - name: render-http
          containerPort: 8000
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 2
          periodSeconds: 1
          failureThreshold: 600
          timeoutSeconds: 1
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          failureThreshold: 5
          timeoutSeconds: 1
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 5
          failureThreshold: 1
          timeoutSeconds: 1
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface
      containers:
      - name: coordinator
        image: ${COORDINATOR_IMAGE}
        imagePullPolicy: IfNotPresent
        args:
        - --config
        - /etc/coordinator/coordinator.yaml
        ports:
        - name: http
          containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /etc/coordinator
      volumes:
      - name: config
        configMap:
          name: llm-d-coordinator-config
      - name: model-cache
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: llm-d-coordinator
  labels:
    app: llm-d-coordinator
spec:
  selector:
    app: llm-d-coordinator
  type: NodePort
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
    nodePort: 30081
