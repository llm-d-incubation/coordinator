apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../base

configMapGenerator:
- name: llm-d-coordinator-config
  files:
  - coordinator.yaml

generatorOptions:
  disableNameSuffixHash: true

patches:
- target:
    kind: Gateway
  patch: |
    - op: replace
      path: /spec/gatewayClassName
      value: agentgateway
